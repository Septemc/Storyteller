<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Storyteller | 世界书</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/theme-init.js"></script>
</head>
<body data-page="worldbook">
  <header class="top-nav">
    <div class="nav-left">
      <span class="app-title">Storyteller</span>
      <span class="app-subtitle">说书人·世界书管理</span>
    </div>
    <div class="nav-center">
      <div class="current-save-info" id="current-save-info">
        <div class="save-name" id="current-save-name">未加载存档</div>
        <div class="save-id" id="current-save-id">--</div>
        <button class="save-manager-toggle-btn" id="save-manager-toggle-btn" title="存档管理">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          存档管理
        </button>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">剧情</a>
      <a href="characters.html" class="nav-link">角色</a>
      <a href="worldbook.html" class="nav-link active">世界书</a>
      <a href="dungeon.html" class="nav-link">剧本</a>
      <a href="settings.html" class="nav-link">设置</a>
    </nav>
  </header>

  <main class="two-column-layout">
    <section class="left-panel">
      <div class="panel-header">
        <div class="panel-title">世界书体系</div>
      </div>

      <!-- 顶部：世界书选择 & 操作 -->
      <div class="settings-section" style="padding-bottom: 12px; border-bottom: 1px solid var(--border-soft); margin-bottom: 10px;">
        <div style="display: flex; gap: 8px; margin-bottom: 6px; align-items: center;">
          <select id="world-selector" class="form-select" style="flex: 1;" placeholder="输入新世界书名称"></select>
          <button id="btn-apply-world" class="btn-primary btn-small">应用</button>
          <button id="btn-new-world" class="btn-secondary btn-small">新建</button>
          <button id="btn-import-world" class="btn-secondary btn-small">导入</button>
          <button id="btn-export-world" class="btn-secondary btn-small">导出</button>
          <button id="btn-delete-world" class="btn-secondary btn-small" style="color:var(--danger)">删除</button>
        </div>

        <!-- 一个通用隐藏 file input，结合 JS 中的 importMode 来区分导入世界/模块/条目 -->
        <input type="file" id="file-input-hidden" accept=".json" style="display: none;">

        <div id="applied-world-info" class="small-text muted" style="margin-top: 6px; color: var(--accent);">
          当前应用：尚未应用任何世界书
        </div>
      </div>


      <!-- 搜索 + 新建模块 / 条目 -->
      <!-- 搜索 + 新建模块 / 条目 + 导入模块 / 条目 + 删除 -->
      <div class="settings-section">
        <div class="search-wrapper" style="position: relative;">
          <input id="search-keyword" class="form-input" placeholder="搜索内容..." style="padding-right: 32px;">
          <button id="btn-search" class="icon-button" style="position: absolute; right: 6px; top: 50%; transform: translateY(-50%);">
            🔍
          </button>
        </div>
        <div class="toolbar-actions"
             style="display: flex; gap: 8px; margin-top: 10px; flex-wrap: nowrap;">
          <button id="btn-create-category" class="btn-secondary btn-small" style="flex:1 1 0;">新建模块</button>
          <button id="btn-create-entry"    class="btn-secondary btn-small" style="flex:1 1 0;">新建条目</button>
          <button id="btn-import-category" class="btn-secondary btn-small" style="flex:1 1 0;">导入模块</button>
          <button id="btn-import-entry"    class="btn-secondary btn-small" style="flex:1 1 0;">导入条目</button>
          <button id="btn-delete-node"     class="btn-secondary btn-small" style="color:var(--danger)">删除</button>
        </div>
      </div>

      <!-- 树状结构容器 -->
      <div id="tree-root" class="worldbook-tree-container" style="flex: 1; min-height: 200px;"></div>

    </section>

    <section class="right-panel">
      <div class="panel-header">
        <div class="panel-title" id="detail-title">内容预览</div>
        <div class="panel-header-right">
          <div class="toggle-group" style="display: inline-flex; border: 1px solid var(--border-soft); border-radius: 4px; margin-right: 10px; overflow: hidden;">
            <button id="mode-preview" class="btn-small active" style="border:none; border-radius:0;">预览</button>
            <button id="mode-edit" class="btn-small" style="border:none; border-radius:0;">编辑</button>
          </div>
          <button id="btn-save-detail" class="btn-primary" disabled>保存修改</button>
          <button id="btn-export-current" class="btn-secondary btn-small" style="margin-left: 8px;">导出</button>
        </div>
      </div>

      <div id="detail-panel" class="detail-panel" style="flex: 1; display: flex; flex-direction: column;">
        <!-- 右侧内容由 JS 动态填充 -->
      </div>
    </section>
  </main>

  <!-- 存档管理弹窗 -->
  <div id="save-manager-modal" class="modal-overlay" style="display: none;">
    <div class="modal-window save-manager-window">
      <div class="modal-header">
        <h3 class="modal-title">存档管理</h3>
        <button id="save-manager-close" class="modal-close-btn" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body save-manager-body">
        <div class="save-list-panel">
          <div class="save-list-header">
            <span class="save-list-title">所有存档</span>
            <button id="new-save-btn" class="btn-primary btn-small">
              <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" style="margin-right: 4px;">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              新建存档
            </button>
          </div>
          <div class="save-list" id="save-list">
            <div class="save-list-empty">
              <div class="empty-icon">📂</div>
              <div class="empty-text">暂无存档</div>
            </div>
          </div>
        </div>
        <div class="save-detail-panel">
          <div class="save-detail-header">
            <span class="save-detail-title">存档详情</span>
          </div>
          <div class="save-detail-content" id="save-detail-content">
            <div class="save-detail-empty">
              <div class="empty-icon">📄</div>
              <div class="empty-text">选择一个存档查看详情</div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="save-manager-cancel" class="btn-secondary">关闭</button>
        <button id="load-save-btn" class="btn-primary" disabled>加载存档</button>
      </div>
    </div>
  </div>

  <!-- 存档重命名弹窗 -->
  <div id="rename-save-modal" class="modal-overlay" style="display: none;">
    <div class="modal-window" style="max-width: 400px;">
      <div class="modal-header">
        <h3 class="modal-title">重命名存档</h3>
        <button id="rename-modal-close" class="modal-close-btn" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-field-group">
          <label class="form-field-label">存档名称</label>
          <input type="text" id="rename-input" class="form-field-input" placeholder="输入新的存档名称">
        </div>
      </div>
      <div class="modal-footer">
        <button id="rename-cancel" class="btn-secondary">取消</button>
        <button id="rename-confirm" class="btn-primary">确认</button>
      </div>
    </div>
  </div>

  <script src="assets/js/save-manager.js"></script>
  <script src="assets/js/worldbook.js"></script>
</body>
</html>
