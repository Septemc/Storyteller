<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>登录 | Storyteller</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/theme-init.js"></script>
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-primary);
      padding: 20px;
    }
    
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 40px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }
    
    .auth-logo {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .auth-logo h1 {
      font-size: 28px;
      color: var(--text-primary);
      margin: 0 0 8px 0;
    }
    
    .auth-logo p {
      color: var(--text-secondary);
      margin: 0;
      font-size: 14px;
    }
    
    .auth-tabs {
      display: flex;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border-color);
    }
    
    .auth-tab {
      flex: 1;
      padding: 12px;
      text-align: center;
      cursor: pointer;
      color: var(--text-secondary);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
      font-size: 15px;
    }
    
    .auth-tab:hover {
      color: var(--text-primary);
    }
    
    .auth-tab.active {
      color: var(--accent-color);
      border-bottom-color: var(--accent-color);
    }
    
    .auth-form {
      display: none;
    }
    
    .auth-form.active {
      display: block;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 15px;
      transition: border-color 0.2s;
      box-sizing: border-box;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: var(--accent-color);
    }
    
    .form-group input::placeholder {
      color: var(--text-muted);
    }
    
    .form-error {
      color: #ef4444;
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
    
    .form-error.show {
      display: block;
    }
    
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    .auth-btn:hover {
      opacity: 0.9;
    }
    
    .auth-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    .auth-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--text-secondary);
      font-size: 13px;
    }
    
    .auth-footer a {
      color: var(--accent-color);
      text-decoration: none;
    }
    
    .auth-footer a:hover {
      text-decoration: underline;
    }
    
    .password-toggle {
      position: relative;
    }
    
    .password-toggle input {
      padding-right: 44px;
    }
    
    .password-toggle-btn {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      padding: 4px;
    }
    
    .password-toggle-btn:hover {
      color: var(--text-primary);
    }
    
    .guest-login {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border-color);
      text-align: center;
    }
    
    .guest-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .guest-btn:hover {
      border-color: var(--accent-color);
      color: var(--accent-color);
    }
  </style>
</head>
<body data-page="login">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <h1>Storyteller</h1>
        <p>说书人 · 互动叙事平台</p>
      </div>
      
      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">登录</button>
        <button class="auth-tab" data-tab="register">注册</button>
      </div>
      
      <form class="auth-form active" id="login-form">
        <div class="form-group">
          <label for="login-username">用户名</label>
          <input type="text" id="login-username" name="username" placeholder="请输入用户名" required autocomplete="username">
        </div>
        
        <div class="form-group">
          <label for="login-password">密码</label>
          <div class="password-toggle">
            <input type="password" id="login-password" name="password" placeholder="请输入密码" required autocomplete="current-password">
            <button type="button" class="password-toggle-btn" data-target="login-password">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        
        <div class="form-error" id="login-error"></div>
        
        <button type="submit" class="auth-btn" id="login-btn">登录</button>
        
        <div class="guest-login">
          <button type="button" class="guest-btn" id="guest-btn">以游客身份继续</button>
        </div>
      </form>
      
      <form class="auth-form" id="register-form">
        <div class="form-group">
          <label for="register-username">用户名</label>
          <input type="text" id="register-username" name="username" placeholder="请输入用户名（至少3位）" required minlength="3" autocomplete="username">
        </div>
        
        <div class="form-group">
          <label for="register-email">邮箱（选填）</label>
          <input type="email" id="register-email" name="email" placeholder="请输入邮箱地址" autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="register-password">密码</label>
          <div class="password-toggle">
            <input type="password" id="register-password" name="password" placeholder="请输入密码（至少6位）" required minlength="6" autocomplete="new-password">
            <button type="button" class="password-toggle-btn" data-target="register-password">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        
        <div class="form-group">
          <label for="register-confirm">确认密码</label>
          <div class="password-toggle">
            <input type="password" id="register-confirm" name="confirm" placeholder="请再次输入密码" required autocomplete="new-password">
            <button type="button" class="password-toggle-btn" data-target="register-confirm">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>
        
        <div class="form-error" id="register-error"></div>
        
        <button type="submit" class="auth-btn" id="register-btn">注册</button>
      </form>
    </div>
  </div>
  
  <script>
    (function() {
      const API_BASE = '/api';
      
      function getToken() {
        return localStorage.getItem('auth_token');
      }
      
      function setToken(token) {
        localStorage.setItem('auth_token', token);
      }
      
      function getUser() {
        const user = localStorage.getItem('auth_user');
        return user ? JSON.parse(user) : null;
      }
      
      function setUser(user) {
        localStorage.setItem('auth_user', JSON.stringify(user));
      }
      
      function clearAuth() {
        localStorage.removeItem('auth_token');
        localStorage.removeItem('auth_user');
      }
      
      async function apiRequest(endpoint, options = {}) {
        const token = getToken();
        const headers = {
          'Content-Type': 'application/json',
          ...(token ? { 'Authorization': `Bearer ${token}` } : {}),
          ...options.headers
        };
        
        const response = await fetch(`${API_BASE}${endpoint}`, {
          ...options,
          headers
        });
        
        const data = await response.json().catch(() => ({}));
        
        if (!response.ok) {
          throw new Error(data.detail || '请求失败');
        }
        
        return data;
      }
      
      const tabs = document.querySelectorAll('.auth-tab');
      const forms = document.querySelectorAll('.auth-form');
      
      tabs.forEach(tab => {
        tab.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          forms.forEach(f => f.classList.remove('active'));
          tab.classList.add('active');
          document.getElementById(`${tab.dataset.tab}-form`).classList.add('active');
        });
      });
      
      document.querySelectorAll('.password-toggle-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const input = document.getElementById(btn.dataset.target);
          const isPassword = input.type === 'password';
          input.type = isPassword ? 'text' : 'password';
          btn.innerHTML = isPassword
            ? '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>'
            : '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>';
        });
      });
      
      const loginForm = document.getElementById('login-form');
      const loginError = document.getElementById('login-error');
      const loginBtn = document.getElementById('login-btn');
      
      loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        loginError.classList.remove('show');
        loginBtn.disabled = true;
        loginBtn.textContent = '登录中...';
        
        try {
          const formData = new FormData(loginForm);
          const data = await apiRequest('/auth/login', {
            method: 'POST',
            body: JSON.stringify({
              username: formData.get('username'),
              password: formData.get('password')
            })
          });
          
          setToken(data.access_token);
          setUser({
            user_id: data.user_id,
            username: data.username,
            role: data.role
          });
          
          window.location.href = 'index.html';
        } catch (err) {
          loginError.textContent = err.message;
          loginError.classList.add('show');
        } finally {
          loginBtn.disabled = false;
          loginBtn.textContent = '登录';
        }
      });
      
      const registerForm = document.getElementById('register-form');
      const registerError = document.getElementById('register-error');
      const registerBtn = document.getElementById('register-btn');
      
      registerForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        registerError.classList.remove('show');
        
        const formData = new FormData(registerForm);
        const password = formData.get('password');
        const confirm = formData.get('confirm');
        
        if (password !== confirm) {
          registerError.textContent = '两次输入的密码不一致';
          registerError.classList.add('show');
          return;
        }
        
        registerBtn.disabled = true;
        registerBtn.textContent = '注册中...';
        
        try {
          const data = await apiRequest('/auth/register', {
            method: 'POST',
            body: JSON.stringify({
              username: formData.get('username'),
              email: formData.get('email') || null,
              password: password
            })
          });
          
          setToken(data.access_token || '');
          setUser(data.user);
          
          const loginData = await apiRequest('/auth/login', {
            method: 'POST',
            body: JSON.stringify({
              username: formData.get('username'),
              password: password
            })
          });
          
          setToken(loginData.access_token);
          setUser({
            user_id: loginData.user_id,
            username: loginData.username,
            role: loginData.role
          });
          
          window.location.href = 'index.html';
        } catch (err) {
          registerError.textContent = err.message;
          registerError.classList.add('show');
        } finally {
          registerBtn.disabled = false;
          registerBtn.textContent = '注册';
        }
      });
      
      document.getElementById('guest-btn').addEventListener('click', () => {
        clearAuth();
        window.location.href = 'index.html';
      });
      
      (async function checkAuth() {
        const token = getToken();
        if (token) {
          try {
            const user = await apiRequest('/auth/me');
            setUser(user);
            window.location.href = 'index.html';
          } catch (err) {
            clearAuth();
          }
        }
      })();
    })();
  </script>
</body>
</html>
