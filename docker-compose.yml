services:
  storyteller:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: storyteller-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8010:8010"
    environment:
      TZ: Asia/Shanghai
      PYTHONUNBUFFERED: "1"
    volumes:
      - storyteller_data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  storyteller_data:
