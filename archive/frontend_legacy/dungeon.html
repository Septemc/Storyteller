<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Storyteller | 剧本编排</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="assets/css/style.css">
  <script src="assets/js/theme-init.js"></script>
</head>
<body data-page="dungeon">
  <header class="top-nav">
    <div class="nav-left">
      <span class="app-title">Storyteller</span>
      <span class="app-subtitle">说书人·剧本与长剧情编排</span>
    </div>
    <div class="nav-center">
      <div class="current-save-info" id="current-save-info">
        <div class="save-name" id="current-save-name">未加载存档</div>
        <div class="save-id" id="current-save-id">--</div>
        <button class="save-manager-toggle-btn" id="save-manager-toggle-btn" title="存档管理">
          <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          存档管理
        </button>
      </div>
    </div>
    <nav class="nav-links">
      <a href="index.html" class="nav-link">剧情</a>
      <a href="characters.html" class="nav-link">角色</a>
      <a href="worldbook.html" class="nav-link">世界书</a>
      <a href="dungeon.html" class="nav-link active">剧本</a>
      <a href="settings.html" class="nav-link">设置</a>
      <div class="nav-user-info">
        <div class="nav-user-wrapper" id="nav-user-wrapper">
          <span class="nav-username" id="nav-username">游客</span>
          <button class="nav-logout-btn" id="nav-logout-btn" title="退出登录" style="display: none;">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/>
              <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
          <div class="nav-user-dropdown" id="nav-user-dropdown">
            <div class="dropdown-item" data-action="profile">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
              <span>个人中心</span>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item" data-action="guide">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
                <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
              </svg>
              <span>使用指南</span>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item" data-action="settings">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="3"/>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
              </svg>
              <span>账户设置</span>
            </div>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item danger" data-action="logout">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
              <span>退出登录</span>
            </div>
          </div>
        </div>
        <a href="login.html" class="nav-login-link" id="nav-login-link">登录</a>
      </div>
    </nav>
  </header>

  <main class="two-column-layout">
    <section class="left-panel">
      <div class="panel-header">
        <div class="panel-title">剧本大纲</div>
      </div>

      <div class="settings-section" style="padding-bottom: 12px; border-bottom: 1px solid var(--border-soft); margin-bottom: 10px;">
        <div style="display: flex; gap: 8px; margin-bottom: 6px; align-items: center;">
          <select id="dungeon-selector" class="form-select" style="flex: 1;" placeholder="选择剧本"></select>
          <button id="btn-apply-script" class="btn-primary btn-small">应用</button>
          <button id="btn-new-dungeon" class="btn-secondary btn-small">新建</button>
          <button id="btn-import-script" class="btn-secondary btn-small">导入</button>
          <button id="btn-export-script" class="btn-secondary btn-small">导出</button>
          <button id="btn-delete-dungeon" class="btn-secondary btn-small" style="color:var(--danger)">删除</button>
        </div>
        <div id="applied-dungeon-info" class="small-text muted" style="margin-top: 6px; color: var(--accent);">
          当前剧本：未加载
        </div>
      </div>

      <div class="settings-section">
        <div class="search-wrapper" style="position: relative;">
          <input id="search-keyword" class="form-input" type="search" placeholder="搜索节点..." style="padding-right: 32px;"
                 autocomplete="new-password" autocapitalize="off" autocorrect="off" spellcheck="false" inputmode="search" enterkeyhint="search"
                 name="dungeon_lookup_query" data-lpignore="true" data-form-type="other" data-search-guard="true">
          <button id="btn-search" class="icon-button" style="position: absolute; right: 6px; top: 50%; transform: translateY(-50%);">
            🔍
          </button>
        </div>
        <div class="toolbar-actions" style="display: flex; gap: 4px; margin-top: 10px; flex-wrap: wrap;">
          <button id="btn-create-dungeon" class="btn-secondary btn-small" style="flex:1;">新建剧本</button>
          <button id="btn-create-node" class="btn-secondary btn-small" style="flex:1;">新建节点</button>
          <button id="btn-import-dungeon" class="btn-secondary btn-small" style="flex:1;">导入剧本</button>
          <button id="btn-import-node" class="btn-secondary btn-small" style="flex:1;">导入节点</button>
          <button id="btn-delete-node" class="btn-secondary btn-small" style="color:var(--danger)">删除</button>
        </div>
        <input type="file" id="file-input-hidden" accept=".json" style="display: none;">
      </div>

      <div id="tree-root" class="worldbook-tree-container" style="flex: 1; min-height: 200px;">
        </div>
    </section>

    <section class="right-panel">
      <div class="panel-header">
        <div class="panel-title" id="detail-title">内容预览</div>
        <div class="panel-header-right">
          <div class="toggle-group mode-toggle" style="margin-right: 10px;">
            <button id="mode-preview" class="btn-small active" type="button">预览</button>
            <button id="mode-edit" class="btn-small" type="button">编辑</button>
          </div>
          <button id="btn-save-detail" class="btn-primary" disabled>保存修改</button>
          <button id="btn-export-current" class="btn-secondary btn-small" style="margin-left: 8px;">导出</button>
        </div>
      </div>

      <div id="detail-panel" class="detail-panel" style="flex: 1; display: flex; flex-direction: column;">
        <div class="placeholder-text" style="color: var(--text-secondary); padding: 20px;">请从左侧选择剧本或节点...</div>
      </div>
    </section>
  </main>

  <!-- 存档管理弹窗 -->
  <div id="save-manager-modal" class="modal-overlay" style="display: none;">
    <div class="modal-window save-manager-window">
      <div class="modal-header">
        <h3 class="modal-title">存档管理</h3>
        <button id="save-manager-close" class="modal-close-btn" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body save-manager-body">
        <div class="save-list-panel">
          <div class="save-list-header">
            <span class="save-list-title">所有存档</span>
            <button id="new-save-btn" class="btn-primary btn-small">
              <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" style="margin-right: 4px;">
                <line x1="12" y1="5" x2="12" y2="19"></line>
                <line x1="5" y1="12" x2="19" y2="12"></line>
              </svg>
              新建存档
            </button>
          </div>
          <div class="save-list" id="save-list">
            <div class="save-list-empty">
              <div class="empty-icon">📂</div>
              <div class="empty-text">暂无存档</div>
            </div>
          </div>
        </div>
        <div class="save-detail-panel">
          <div class="save-detail-header">
            <span class="save-detail-title">存档详情</span>
          </div>
          <div class="save-detail-content" id="save-detail-content">
            <div class="save-detail-empty">
              <div class="empty-icon">📄</div>
              <div class="empty-text">选择一个存档查看详情</div>
            </div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button id="save-manager-cancel" class="btn-secondary">关闭</button>
        <button id="load-save-btn" class="btn-primary" disabled>加载存档</button>
      </div>
    </div>
  </div>

  <!-- 存档重命名弹窗 -->
  <div id="rename-save-modal" class="modal-overlay" style="display: none;">
    <div class="modal-window" style="max-width: 400px;">
      <div class="modal-header">
        <h3 class="modal-title">重命名存档</h3>
        <button id="rename-modal-close" class="modal-close-btn" aria-label="关闭">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-field-group">
          <label class="form-field-label">存档名称</label>
          <input type="text" id="rename-input" class="form-field-input" placeholder="输入新的存档名称">
        </div>
      </div>
      <div class="modal-footer">
        <button id="rename-cancel" class="btn-secondary">取消</button>
        <button id="rename-confirm" class="btn-primary">确认</button>
      </div>
    </div>
  </div>

  <script src="assets/js/save-manager.js"></script>
  <script src="assets/js/search-guard.js"></script>
  <script src="assets/js/auth.js"></script>
  <script src="assets/js/account.js"></script>
  <script src="assets/js/dungeon.js"></script>
</body>
</html>
